<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Primer semestre de comercio internacional</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        header {
            background-image: url('https://images.unsplash.com/photo-1551288049-bebda4e38f71');
            background-size: cover;
            background-position: center;
            padding: 80px 20px;
        }

        header h1 {
            background: rgba(0,0,0,0.6);
            display: inline-block;
            padding: 15px;
            border-radius: 10px;
        }

        .contenido {
            margin: 40px;
        }

        .boton {
            display: block;
            width: 250px;
            margin: 15px auto;
            padding: 15px;
            background: #00c6ff;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .boton:hover {
            background: #0072ff;
            color: white;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>

        <h1>

        </h1>

    <div class="contenido">
        <h2>Descargar archivos CSV</h2>

        <!-- Enlaces de descarga -->
        <a href="archivo1.csv" download class="boton">Descargar Archivo 1</a>
        <a href="archivo2.csv" download class="boton">Descargar Archivo 2</a>
